<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Periodic Table — Interactive Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>PERIODIC TABLE</h1>
  </header>

  <div class="controls">
    <button class="toggle is-active" id="btn-table"  onclick="setLayout('table')">Table</button>
    <button class="toggle"           id="btn-sphere" onclick="setLayout('sphere')">Sphere</button>
    <button class="toggle"           id="btn-helix"  onclick="setLayout('helix')">Helix</button>
    <button class="toggle"           id="btn-grid"   onclick="setLayout('grid')">Grid</button>
  </div>

  <div id="scene">
    <div id="scene-content"></div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script src="script.js"></script>
</body>
</html>
